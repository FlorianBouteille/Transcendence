<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error Log</title>
  <link rel="stylesheet" href="./assets/styles.css" />
	<link rel="icon" href="./static/favicon.ico">
</head>
<body>
  <main class="screen screen--status screen--status-error">
    <div class="status-wrap">
      <h1 class="status-title">ERROR LOG</h1>
      <img class="status-character status-character--error" src="/perso_color/perso_big_eyes.png" alt="Error character" />
      <p class="status-message" id="errorMessage">Failed to connect to the server</p>
      <a class="status-return" id="errorReturn" href="register.html">return</a>
    </div>
  </main>

  <script>
    const messageEl = document.getElementById('errorMessage');
    const returnEl = document.getElementById('errorReturn');

    const storedMessage = sessionStorage.getItem('errorMessage');
    const backTo = sessionStorage.getItem('errorBackTo');

    if (storedMessage) {
      messageEl.textContent = storedMessage;
      sessionStorage.removeItem('errorMessage');
    }

    if (backTo === 'already.html' || backTo === 'register.html') {
      returnEl.href = backTo;
    } else if (document.referrer.includes('already.html')) {
      returnEl.href = 'already.html';
    } else {
      returnEl.href = 'register.html';
    }

    sessionStorage.removeItem('errorBackTo');
  </script>
</body>
</html>
