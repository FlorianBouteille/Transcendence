<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Profil | ft_transcendence</title>
	<link rel="stylesheet" href="./assets/styles.css" />
	<link rel="icon" href="./static/favicon.ico">
</head>
<body>
	<main id="profile-main" class="screen screen--legacy screen--profile profile-page hidden">
		<a class="profile-return" href="index.html">return</a>
		<a class="profile-friends" href="friends.html">friends</a>
		<div id="pingpong-rain" class="pingpong-rain" aria-hidden="true"></div>
		<section class="profile-hero">
			<svg class="profile-arc" viewBox="0 0 500 240" role="img" aria-hidden="true">
				<defs>
					<path id="arc-text" d="M 40 210 A 210 210 0 0 1 460 210" />
				</defs>
				<text>
					<textPath id="profile-welcome" href="#arc-text" startOffset="50%" text-anchor="middle">WELCOME PLAYER</textPath>
				</text>
			</svg>
		</section>

		<div id="cloud-bg" class="profile-cloud" aria-label="Profil">
			<img src="perso_color/cloud.png" alt="" aria-hidden="true">
			<div id="cloud-message" class="profile-cloud-message">
				<p class="cloud-text" id="profile-bio"></p>
				<p class="cloud-stats" id="profile-stats"></p>
				<div class="xp-container">
					<div class="xp-header">
						<span class="level-badge" id="profile-level">Level 1</span>
						<span class="xp-text" id="profile-xp">0 / 100 XP</span>
					</div>
					<div class="xp-bar-bg">
						<div class="xp-bar-fill" id="xp-bar-fill"></div>
					</div>
				</div>
			</div>
		</div>

		<div class="achievements-section">
			<h2 class="achievements-title">🏆 Achievements</h2>
			<div id="achievements-container" class="achievements-grid">
				<p class="loading-achievements">Loading achievements...</p>
			</div>
		</div>

		<div id="personnage-container" class="profile-character-wrap">
			<img id="personnage-img" class="profile-character" src="" alt="Personnage">
		</div>
	</main>
<!-- 		<div class="profile-stage">
			<div id="personnage-container" class="profile-character-wrap">
				<img id="personnage-img" class="profile-character" src="" alt="Personnage">
			</div>
			<img id="podium" class="profile-podium" src="perso_color/podium.png" alt="Podium">
		</div>
	</main>
-->
	<script defer>
		document.addEventListener("DOMContentLoaded", async () => {
			const main = document.getElementById("profile-main");

			try {
				const response = await fetch("/api/profiles/me", {
					method: "GET",
					credentials: "include" // send JWT cookie
				});

				if (!response.ok) {
					window.location.href = "already.html";
					return;
				}

				const data = await response.json();
				const wins = Number(data.wins || 0);
				const totalGames = Number(data.allGames || 0);
				const login = data.username || data.login || data.pseudonym || "PLAYER";
				const winrate = totalGames > 0 ? ((wins / totalGames) * 100).toFixed(1) : "0.0";
				console.log(data);
					document.getElementById("profile-welcome").textContent = `WELCOME ${String(login).toUpperCase()}`;
				document.getElementById("profile-bio").textContent = data.bio || "Ready for the next match?";
				document.getElementById("profile-stats").textContent =
					`Games: ${totalGames} • Wins: ${wins}\nWinrate: ${winrate}%`; 		
				// Afficher l'XP et le niveau
				const level = data.level || 0;
				const xp = data.xp || 0;
				const xpForCurrentLevel = level * 100;
				const xpForNextLevel = (level + 1) * 100;
				const xpInCurrentLevel = xp - xpForCurrentLevel;
				const xpNeededForNextLevel = xpForNextLevel - xpForCurrentLevel;
				const progressPercent = (xpInCurrentLevel / xpNeededForNextLevel) * 100;
				
				document.getElementById("profile-level").textContent = `Level ${level}`;
				document.getElementById("profile-xp").textContent = `${xpInCurrentLevel} / ${xpNeededForNextLevel} XP`;
				document.getElementById("xp-bar-fill").style.width = `${progressPercent}%`;
				
				// Fetch and display achievements
				fetchAchievements();
				
				// Show page after successful fetch
				main.classList.remove("hidden");

			} catch (error) {
				window.location.href = "already.html";
			}
		});

		async function fetchAchievements() {
			try {
				const response = await fetch("http://localhost:8080/api/achievements/me", {
					method: "GET",
					credentials: "include"
				});

				if (!response.ok) throw new Error("Failed to fetch achievements");

				const result = await response.json();
				const achievementsContainer = document.getElementById("achievements-container");
				
				if (result.data && result.data.length > 0) {
					achievementsContainer.innerHTML = result.data.map(item => `
						<div class="achievement-card">
							<div class="achievement-icon">${item.achievement.icon}</div>
							<div class="achievement-info">
								<h3 class="achievement-name">${item.achievement.achievement_name}</h3>
								<p class="achievement-desc">${item.achievement.achievement_description}</p>
								<span class="achievement-date">Unlocked: ${new Date(item.acquired_at).toLocaleDateString()}</span>
							</div>
							<span class="achievement-badge ${item.achievement.category}">${item.achievement.category}</span>
						</div>
					`).join('');
				} else {
					achievementsContainer.innerHTML = '<p class="no-achievements">No achievements yet. Play some games to unlock them! 🎮</p>';
				}
			} catch (error) {
				console.error("Error fetching achievements:", error);
				document.getElementById("achievements-container").innerHTML = '<p class="no-achievements">Failed to load achievements</p>';
			}
		}

        const personnages = [
            'perso_color/alien_1.png',
            'perso_color/alien_2.png',
            'perso_color/alien_3.png',
            'perso_color/alien_4.png',
            'perso_color/alien_5.png',
            'perso_color/alien_6.png',
            'perso_color/alien_7.png',
            'perso_color/alien_8.png',
            'perso_color/alien_9.png',
            'perso_color/alien_10.png',
            'perso_color/alien_11.png',
            'perso_color/alien_12.png',
            'perso_color/alien_13.png',
            'perso_color/alien_14.png',
            'perso_color/alien_15.png',
            'perso_color/alien_16.png',
            'perso_color/alien_17.png',
            'perso_color/alien_18.png',
            'perso_color/alien_19.png',
            'perso_color/alien_20.png',
            'perso_color/alien_21.png',
            'perso_color/alien_22.png',
            'perso_color/alien_23.png',
            'perso_color/perso_24.png'
        ];

		const personnageAleatoire = personnages[Math.floor(Math.random() * personnages.length)];

		document.getElementById('personnage-img').src = personnageAleatoire;

		const rainLayer = document.getElementById('pingpong-rain');
		const ballImage = 'perso_color/pingpong.png';
		const minDurationMs = 120000;
		const maxDurationMs = 240000;
		const rainDurationMs = Math.floor(minDurationMs + Math.random() * (maxDurationMs - minDurationMs));
		const rainEndsAt = performance.now() + rainDurationMs;

		const spawnBall = () => {
			const ball = document.createElement('img');
			const size = Math.floor(24 + Math.random() * 58);
			const duration = (2.2 + Math.random() * 2.2).toFixed(2);
			const delay = (Math.random() * 0.25).toFixed(2);
			const variant = Math.random();
			const bounceClass = variant < 0.35 ? 'is-mid' : (variant < 0.675 ? 'is-three' : 'is-four');
			const maxX = Math.max(0, window.innerWidth - size);
			const x = Math.floor(Math.random() * maxX);

			ball.src = ballImage;
			ball.alt = '';
			ball.className = `pingpong-ball ${bounceClass}`;
			ball.style.left = `${x}px`;
			ball.style.setProperty('--size', `${size}px`);
			ball.style.setProperty('--duration', `${duration}s`);
			ball.style.setProperty('--delay', `${delay}s`);

			ball.addEventListener('animationend', () => {
				ball.remove();
			});

			rainLayer.appendChild(ball);
		};
        const spawnLoop = () => {
            if (performance.now() > rainEndsAt) {
                return;
            }
            spawnBall();
            const nextIn = Math.floor(45 + Math.random() * 90);
            window.setTimeout(spawnLoop, nextIn);
        };

		spawnLoop();

</script>
</body>
</html>
