<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Games | ft_transcendence</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="screen screen--legacy screen--history">
    <div class="z-10 flex w-full max-w-5xl flex-col items-start gap-2">
      <section class="history-board" aria-labelledby="history-title">
        <header class="history-header">
          <h1 id="history-title" class="history-title">LAST GAMES</h1>
          <p class="history-subtitle">Historique recent: plus recente vers plus ancienne</p>
        </header>

        <div class="history-table">
          <div class="history-row history-row--head history-row--recent">
            <span>Login</span>
            <span>Date</span>
            <span class="history-score">Score</span>
          </div>
          <div id="history-body" class="grid gap-3"></div>
        </div>
      </section>

      <a class="history-return" href="index.html">retour</a>
    </div>
  </main>

  <script>
    const HISTORY_ENDPOINT = '/api/history?limit=100';
    const historyBody = document.getElementById('history-body');

    const formatDate = (value) => {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return new Intl.DateTimeFormat('fr-FR').format(date);
    };

    const toTimestamp = (value) => {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? -Infinity : date.getTime();
    };

    const createRow = ({ login, date, score }) => {
      const row = document.createElement('div');
      row.className = 'history-row history-row--recent';

      const loginCell = document.createElement('span');
      loginCell.textContent = login ?? '-';

      const dateCell = document.createElement('span');
      dateCell.textContent = formatDate(date);

      const scoreCell = document.createElement('span');
      scoreCell.textContent = score ?? '-';
      scoreCell.className = 'history-score';

      row.append(loginCell, dateCell, scoreCell);
      return row;
    };

    const renderHistory = (games) => {
      historyBody.innerHTML = '';

      const recent = (Array.isArray(games) ? games : [])
        .slice()
        .sort((a, b) => toTimestamp(b.date) - toTimestamp(a.date))
        .slice(0, 10);

      if (!recent.length) {
        historyBody.appendChild(createRow({ login: 'Aucune partie', date: '', score: '' }));
        return;
      }

      recent.forEach((game) => {
        historyBody.appendChild(createRow(game));
      });
    };

    const loadHistory = async () => {
      try {
        const response = await fetch(HISTORY_ENDPOINT, { credentials: 'include' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        renderHistory(data);
      } catch (error) {
        renderHistory([]);
      }
    };

    loadHistory();
  </script>
</body>
</html>
