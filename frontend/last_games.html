<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Last Games | ft_transcendence</title>
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<main class="landing history-page">
			<a class="nav-link top-left" href="index">retour</a>

			<section class="history-board" aria-labelledby="history-title">
				<header class="history-header">
					<h1 id="history-title" class="history-title">LAST GAMES</h1>
				</header>

				<div class="history-table">
					<div class="history-row history-row--head history-row--no-rank">
						<span>Game mode</span>
						<span>Date</span>
						<span>Duration</span>
						<span>Winner</span>
					</div>
					<div id="history-body"></div>
				</div>
			</section>
		</main>

		<script>
			const HISTORY_ENDPOINT = "/api/games?limit=10";

			const historyBody = document.getElementById("history-body");

			// const formatDate = (value) => {
			// 	if (!value) return "-";
			// 	const date = new Date(value);
			// 	if (Number.isNaN(date.getTime())) return String(value);
			// 	return new Intl.DateTimeFormat("fr-FR").format(date);
			// };

			const createRow = ({ mode, date, duration, winner }) => {
				const row = document.createElement("div");
				row.className = "history-row history-row--no-rank";

				const gameModeCell = document.createElement("span");
				gameModeCell.textContent = mode ?? "-";

				const dateCell = document.createElement("span");
				dateCell.textContent = date ?? "-";

				const durationCell = document.createElement("span");
				durationCell.textContent = duration ?? "-";

				const winnerCell = document.createElement("span");
				winnerCell.textContent = winner ?? "-";

				row.append(gameModeCell, dateCell, durationCell, winnerCell);
				return row;
			};

			const renderHistory = (games) => {
				historyBody.innerHTML = "";

				const limited = Array.isArray(games) ? games.slice(0, 10) : [];
				if (!limited.length) {
					const emptyRow = createRow({
						mode: "Aucune partie",
						date: "",
						duration: "",
						winner: "",
					});
					historyBody.appendChild(emptyRow);
					return;
				}

				limited.forEach((game) => {
					historyBody.appendChild(createRow(game));
				});
			};

			const loadHistory = async () => {
				try {
					const response = await fetch(HISTORY_ENDPOINT, { credentials: "include" });
					if (!response.ok) {
						throw new Error(`HTTP ${response.status}`);
					}
					const result = await response.json();
					renderHistory(result.data);
				} catch (error) {
					renderHistory([]);
				}
			};

			loadHistory();
		</script>
	</body>
</html>
