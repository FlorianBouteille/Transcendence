<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game Recap</title>
        <link rel="stylesheet" href="style_gameRecap.css">
    </head>
    <body>
        <header class="hero-ribbon">
            <div class="ticker" aria-hidden="true">
                <div class="ticker-track">
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                </div>
                <div class="ticker-track" aria-hidden="true">
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                    <span>VICTORY</span>
                </div>
            </div>
        </header>

        <div class="recap-container">
            <div class="winner-banner">
                <span id="winner-name">Player</span> Won in <span id="completion-time">0</span> seconds!
            </div>
            <h2>ICI ON PEUT REMPLIR LA PAGE DIRECT DEPUIS LA DB VU QU'ELLE A ETE REMPLIE AVANT</h2> 
            <div class="leaderboard">
                <h2><a class="leaderboard-link" href="leaderboard.html">Leaderboard</a></h2>
                <div id="leaderboard-list">
                    <!-- Sera rempli dynamiquement -->
                </div>
            </div>
            
            <button class="back-button" onclick="window.location.href='lobby.html'">
                Back to Lobby
            </button>
        </div>

        <script type="module">
            // Récupérer les données depuis l'URL ou localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const winnerId = urlParams.get('winner');
            const elapsedTime = urlParams.get('time');
            
            // Remplir les infos
            if (winnerId) {
                document.getElementById('winner-name').textContent = winnerId;
            }
            if (elapsedTime) {
                document.getElementById('completion-time').textContent = parseFloat(elapsedTime).toFixed(2);
            }
            
            // TODO: Remplir le classement avec les données des joueurs
        </script>
        
    </body>
</html>
