<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game Recap</title>
        <link rel="stylesheet" href="style.css">
        <style>
            .recap-container {
                text-align: center;
                padding: 50px;
                font-family: Arial, sans-serif;
            }
            .winner-banner {
                font-size: 2em;
                font-weight: bold;
                margin-bottom: 30px;
                color: #FFD700;
            }
            .leaderboard {
                max-width: 600px;
                margin: 0 auto;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 10px;
                padding: 20px;
            }
            .leaderboard-item {
                display: flex;
                justify-content: space-between;
                padding: 10px;
                margin: 5px 0;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 5px;
            }
            .rank { font-weight: bold; }
            .back-button {
                margin-top: 30px;
                padding: 10px 20px;
                font-size: 1.2em;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="recap-container">
            <div id="game-banner">
                <span id="game-mode">Mode</span>
                <span id="date">Date</span>
            </div>
            <div class="winner-banner">
                <span id="winner-name">Player</span> Won in <span id="completion-time">0</span> seconds!
            </div>
            <div class="leaderboard">
                <h2>Leaderboard</h2>
                <div id="leaderboard-list">
                    <!-- Sera rempli dynamiquement -->
                </div>
            </div>
            
            <button class="back-button" onclick="window.location.href='lobby.html'">
                Back to Lobby
            </button>
        </div>

        <script type="module">
            // Récupérer les données depuis l'URL ou localStorage
            const urlParams = new URLSearchParams(window.location.search);
            const response = await fetch('api/games/' + urlParams.get('id'));
            const game = await response.json();
            console.log(game.data[0]);
            const winner = game.data[0].players[1];

       function fill_leaderBoard() 
       {
            const list = document.getElementById('leaderboard-list');
            const players = game.data[0].players;
            
            const sortedPlayers = Object.entries(players).sort((a, b) => a[0] - b[0]);
            sortedPlayers.forEach(([position, pseudo]) => {
                const item = document.createElement('div');
                item.className = 'leaderboard-item';
                item.innerHTML = `
                    <span class="rank">#${position}</span>
                    <span class="name">${pseudo}</span>
                `;
                list.appendChild(item);
            });
        }
            // Remplir les infos
            document.getElementById('game-mode').innerText = game.mode;
            document.getElementById('date').innerText = game.data[0].date;
            document.getElementById('winner-name').innerText = winner;
            document.getElementById('completion-time').innerText = game.data[0].duration;
            fill_leaderBoard();
     
        </script>
    </body>
</html>
