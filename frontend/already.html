<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Already | ft_transcendence</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="screen screen--legacy screen--auth">
    <a class="auth-return" href="index.html">return</a>

    <section class="auth-card" aria-labelledby="login-title">
      <h1 id="login-title" class="auth-title">Login</h1>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label class="auth-field">
          <span>Login</span>
          <input class="auth-input" type="text" id="login" name="login" placeholder="Enter your login or mail..." required />
        </label>

        <label class="auth-field">
          <span>Password</span>
          <input class="auth-input" type="password" id="password" name="password" placeholder="Enter your password..." required />
        </label>

        <button class="auth-submit" type="submit">Sign in</button>
        <p id="message" class="auth-helper"></p>
      </form>

      <p class="auth-switch">
        No account yet?
        <a href="register.html">Sign up</a>
      </p>
    </section>
  </main>

		<script>
				const messageEl = document.getElementById('message');

				// const existingToken = localStorage.getItem('token');
				// if (existingToken) {
				// 	messageEl.textContent = 'Vous etes deja connecte';
				// 	messageEl.style.color = 'green';
				// }

				document.getElementById('loginForm').addEventListener('submit', async (e) =>{
					e.preventDefault();

					const login = document.getElementById('login').value;
					const password = document.getElementById('password').value;

					try {
				const response = await fetch('/api/login', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ login, password })
				});

				const data = await response.json();

				if (response.ok) {
					// Verifier si 2FA est requis
					if (data.requires_2FA) {
						localStorage.setItem('pending_2fa_user_id', data.user_id);
						messageEl.textContent = 'Verification 2FA requise...';
						messageEl.style.color = 'orange';
						setTimeout(() => window.location.href = '2FA.html', 1000);
					} else {
						// Connexion directe
						localStorage.setItem('token', data.token);
						localStorage.setItem('user', JSON.stringify(data.user));

						// messageEl.textContent = `Connexion reussie! Bienvenue ${data.user.username}`;
						// messageEl.style.color = 'green';

						setTimeout(() => window.location.href = 'success.html', 10);
					}
				} else {
					sessionStorage.setItem('errorMessage', data.error);
					window.location.href = 'error.html';
				}
			} catch (err) {
				sessionStorage.setItem('errorMessage', 'Failed to connect to the server');
				window.location.href = 'error.html';
			}
				})

		</script>
	</body>
</html>
