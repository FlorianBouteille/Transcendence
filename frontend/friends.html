<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Friends | ft_transcendence</title>
	<link rel="stylesheet" href="./assets/styles.css" />
	<link rel="icon" href="./static/favicon.ico">
</head>
<body>
	<main class="screen screen--legacy screen--profile friends-page">
		<a class="profile-return" href="lobby.html">lobby</a>
		<a class="friends-profile-link" href="profil.html">profile</a>

		<div class="friends-shell">
			<header class="friends-hero">
				<h1 class="friends-title">Friends</h1>
				<p class="friends-subtitle">ADD, ACCEPT, TRACK ONLINE STATUS</p>
			</header>
			<section class="friends-board" aria-labelledby="friends-board-title">
				<h2 id="friends-board-title" class="friends-board-title">Your friends area</h2>
				<p class="friends-board-copy">
					Search a player by pseudonym, send a request, and manage incoming requests.
				</p>

				<form id="add-friend-form" class="auth-form" autocomplete="off">
					<label for="friend-pseudonym">Friend pseudonym</label>
					<input
						id="friend-pseudonym"
						name="friendPseudonym"
						class="auth-input"
						type="text"
						maxlength="50"
						required
						placeholder="Friend pseudonym"
					/>
					<button type="submit" id="add-friend-btn" class="btn btn--primary">Send request</button>
				</form>

				<p id="friends-feedback" class="friends-board-copy" aria-live="polite"></p>

				<div class="friends-placeholder-grid">
					<article class="friends-placeholder-card">
						<h3>Friends</h3>
						<ul id="friends-list"></ul>
					</article>
					<article class="friends-placeholder-card">
						<h3>Received requests</h3>
						<ul id="requests-received-list"></ul>
					</article>
					<article class="friends-placeholder-card">
						<h3>Sent requests</h3>
						<ul id="requests-sent-list"></ul>
					</article>
				</div>
			</section>
		</div>
	</main>
	<script type="module" src="./friends.js"></script>
</body>
</html>
