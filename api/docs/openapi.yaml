openapi: 3.0.4
info:
  title: API GAME
  description: Optional multiline or single-line description in [CommonMark](http://commonmark.org/help/) or HTML.
  version: 0.1.9

servers:
  - url: http://localhost/v1
    description: Optional server description, e.g. Main (production) server
  - url: http://staging-api.example.com
    description: Optional server description, e.g. Internal staging server for testing

paths:
  /users:
    get:
      summary: Returns a list of users.
      description: Optional extended description in CommonMark or HTML.
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string



/**
 * @openapi
 * /history:
 *   get:
 *     summary: Get all games played
 *     description: Fetch global game history with optional filtering and pagination.
 *     parameters:
 *       - in: query
 *         name: winner
 *         schema:
 *           type: string
 *         description: Filter games by winner pseudonym
 *       - in: query
 *         name: mode
 *         schema:
 *           type: string
 *         description: Filter games by mode
 *       - in: query
 *         name: limit
 *         schema:
 *           type: integer
 *           default: 50
 *         description: Number of results per page
 *       - in: query
 *         name: page
 *         schema:
 *           type: integer
 *           default: 1
 *         description: Page number
 *     responses:
 *       200:
 *         description: List of games
 *         content:
 *           application/json:
 *             schema:
 *               type: object
 *               properties:
 *                 data:
 *                   type: array
 *                   items:
 *                     type: object
 *                     properties:
 *                       mode:
 *                         type: string
 *                       date:
 *                         type: string
 *                         format: date-time
 *                       duration:
 *                         type: string
 *                       winner:
 *                         type: string
 *                 pagination:
 *                   type: object
 *                   properties:
 *                     page:
 *                       type: integer
 *                     limit:
 *                       type: integer
 *                     total:
 *                       type: integer
 *                 filters:
 *                   type: object
 *                   properties:
 *                     winner:
 *                       type: string
 *                     mode:
 *                       type: string
 *       400:
 *         description: Invalid query parameter
 *       500:
 *         description: Internal server error
 */
